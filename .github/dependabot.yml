version: 2
updates:
  # Keep GitHub Actions current (this is what resolves action-runtime
  # deprecations like the Node.js 20 warning automatically).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]

  # Python dependencies declared in pyproject.toml (uv project).
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
    groups:
      python:
        patterns: ["*"]
