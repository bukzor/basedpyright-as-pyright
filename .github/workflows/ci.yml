name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          # No committed uv.lock (template gitignores it), so key the cache off
          # the dependency source instead of the default uv.lock/requirements
          # glob — otherwise the key is constant and the cache never refreshes.
          cache-dependency-glob: pyproject.toml

      # The pyright wrapper and basedpyright run a JS engine via `node`.
      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Typecheck (strict)
        run: uv run pyright .

      - name: Test
        run: uv run pytest -v
