name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      # The pyright wrapper and basedpyright run a JS engine via `node`.
      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Typecheck (strict)
        run: uv run pyright .

      - name: Test
        run: uv run pytest -v
